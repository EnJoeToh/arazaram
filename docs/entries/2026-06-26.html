      <time datetime="2026-06-26">2026年06月26日（金）</time>
    </p>
    <p>　早朝にすさまじい雷と大雨。<br>
　市内の色んな電車が止まっているので、基本的に外には出ない構え。<br>
　疲労も蓄積しているのでぼんやりと。<br>
　シナリオのためのマークアップとはなんなのかを考える。たとえばお使いクエストはどうパースされるものなのか、とか。<br>
　あるいは、フラグの充足問題のネットワークであるのかどうか。<br>
　あまりにも蒸すので除湿器を引っ張り出す。大量の水がとれる。<br>
『<a href="https://www.kadokawa.co.jp/product/322602000646/">バスタード・ソードマン ４</a>』<br>
『<a href="https://houbunsha.co.jp/comics/detail.php?p=%A4%CA%A4%CB%A4%E2%CD%FD%B2%F2%A4%E9%A4%CA%A4%A4">なにも理解らない １、２</a>』<br>
　読む。</p>
