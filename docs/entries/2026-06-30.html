    <p>　蒸し暑い。<br>
　ぼんやりとすごす。<br>
　幾流か小説の中間表現について考えるが、要するにはそれは読解の技術なのであって、書き方の方は無限の中間表現を許す、という気持ちに。<br>
　ピエール・メナール、あるいは、リネージとしての炭素文学と硅素文学について。<br>
　トウモロコシを茹で、鮎を焼き、枝豆とミョウガを炒め、水茄子をちぎり生姜醤油をかけ、油揚と青ネギの味噌汁。<br>
　夏越の祓につき水無月。<br>
『<a href="https://www.kodansha.co.jp/comic/products/0000427468">悪食令嬢と狂血公爵 13</a>』読む。</p>
